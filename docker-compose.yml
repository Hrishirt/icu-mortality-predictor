services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mortality_user
      POSTGRES_PASSWORD: mortality_pass
      POSTGRES_DB: mortality_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mortality_user -d mortality_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://mortality_user:mortality_pass@postgres:5432/mortality_db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      MODEL_DIR: /app/artifacts
      DATA_DIR: /app/data/physionet
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./artifacts:/app/artifacts

volumes:
  postgres_data:
